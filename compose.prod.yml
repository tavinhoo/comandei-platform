services:
  postgres:
    image: postgres:15-alpine
    container_name: cmdi-db
    environment:
      POSTGRES_DB: comandei
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - comandei-network

  cmdi-api:
    build:
      context: ./api
      target: runtime
    container_name: cmdi-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/comandei
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_SEED_ENABLED: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - comandei-network

  cmdi-web:
    build:
      context: ./web
      target: runtime
    container_name: cmdi-web
    depends_on:
      - cmdi-api
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - comandei-network

volumes:
  db_data:

networks:
  comandei-network:
    driver: bridge
